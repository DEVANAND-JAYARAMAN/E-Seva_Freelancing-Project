name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'src/**'
      - 'public/**'
      - 'package*.json'
      - 'next.config.mjs'
      - 'tailwind.config.js'
      - 'tsconfig.json'
      - '.github/workflows/frontend-ci-cd.yml'
  workflow_dispatch:

concurrency:
  group: frontend-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      # Amplify auto-deploys on push to main — no manual trigger needed
